<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>守店猫</title>
  <style>
    :root {
      --paper: rgba(255, 248, 236, 0.96);
      --ink: #24170d;
      --orange: #ef8b39;
      --orange-deep: #c46a20;
      --green: #35c977;
      --red: #ef5e4f;
      --gray: #8a8a8a;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      background: transparent;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
      user-select: none;
      overflow: hidden;
    }
    .drag-region {
      position: fixed; inset: 0;
      -webkit-app-region: drag;
    }
    .toolbar {
      position: absolute; right: 8px; top: 8px;
      display: flex; gap: 6px;
      opacity: 0.25;
      transition: opacity 0.2s;
      -webkit-app-region: no-drag;
      z-index: 10;
    }
    .toolbar:hover { opacity: 1; }
    .toolbar button {
      width: 24px; height: 24px;
      border: 2px solid var(--ink);
      border-radius: 7px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
    }
    .toolbar button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

    .bubble {
      position: absolute;
      left: 12px; top: 14px;
      max-width: 240px;
      padding: 10px 12px;
      border: 2px solid var(--ink);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(6px) scale(.96);
      transition: opacity 0.2s, transform 0.2s;
      -webkit-app-region: no-drag;
      pointer-events: none;
      z-index: 5;
    }
    .bubble.show { opacity: 1; transform: translateY(0) scale(1); }
    .bubble::after {
      content: "";
      position: absolute;
      left: 110px; bottom: -10px;
      width: 14px; height: 14px;
      background: var(--paper);
      border-right: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      transform: rotate(45deg);
    }

    .cat-container {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -42%);
      width: 200px; height: 200px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      animation: bob 1.6s ease-in-out infinite;
    }
    .cat-container:active { animation-play-state: paused; }
    .cat-svg { width: 100%; height: 100%; image-rendering: pixelated; }

    .shadow {
      position: absolute;
      left: 50%; bottom: 28px;
      transform: translateX(-50%);
      width: 100px; height: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.22);
      filter: blur(2px);
      animation: shadowPulse 1.6s ease-in-out infinite;
    }

    .state-label {
      position: absolute;
      left: 50%; bottom: 8px;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      color: var(--orange-deep);
      background: var(--paper);
      padding: 3px 10px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      box-shadow: 2px 2px 0 var(--ink);
      letter-spacing: 0.05em;
    }

    @keyframes bob { 0%,100% { transform: translate(-50%, -42%); } 50% { transform: translate(-50%, -48%); } }
    @keyframes shadowPulse { 0%,100% { transform: translateX(-50%) scale(1); opacity: 0.22; } 50% { transform: translateX(-50%) scale(0.78); opacity: 0.12; } }
    @keyframes wiggle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

    /* 4 种状态的不同效果 */
    .cat-container.state-heartbreak { animation: bob 2.4s ease-in-out infinite; }
    .cat-container.state-urgent     { animation: bob 0.8s ease-in-out infinite; }
    .cat-container.state-overload   .cat-svg { animation: wiggle 0.4s ease-in-out infinite; }
    .cat-container.state-prosperity .cat-svg { filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6)); }

    /* 头顶飘字 */
    .head-emote {
      position: absolute;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .head-emote.show { opacity: 1; animation: floatUp 1.2s ease-out infinite; }
    @keyframes floatUp {
      0% { transform: translate(-50%, 6px); opacity: 0.4; }
      80% { opacity: 1; }
      100% { transform: translate(-50%, -8px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="drag-region"></div>

  <div class="toolbar">
    <button id="btn-report" title="查看日报">📋</button>
    <button id="btn-close" title="关闭">×</button>
  </div>

  <div class="bubble" id="bubble">主人，我在巡店～</div>

  <div class="cat-container state-idle" id="cat">
    <div class="head-emote" id="emote"></div>
    <!-- SVG 像素风猫，4 种表情通过切换 inner content 实现 -->
    <svg class="cat-svg" id="catSvg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <!-- 内容由 setCat() 动态注入 -->
    </svg>
  </div>

  <div class="shadow"></div>
  <div class="state-label" id="stateLabel">巡店中</div>

  <script>
    // ============================================================
    // 4 种猫的 SVG（像素风格，每个状态独立绘制）
    // 设计思路：每个状态用 viewBox 64x64 像素网格画一只方块猫
    // 颜色用 CSS 变量，方便皮肤切换
    // ============================================================
    const CAT_SVG = {
      // 营业大吉：橘猫戴皇冠 + 周围金币
      prosperity: `
        <defs>
          <pattern id="sparkle" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
            <circle cx="4" cy="4" r="0.6" fill="#ffd700" opacity="0.6"/>
          </pattern>
        </defs>
        <!-- 金币散落 -->
        <circle cx="10" cy="20" r="3" fill="#ffd700" stroke="#c79100" stroke-width="0.6"/>
        <circle cx="54" cy="22" r="3" fill="#ffd700" stroke="#c79100" stroke-width="0.6"/>
        <circle cx="8" cy="42" r="2.5" fill="#ffd700" stroke="#c79100" stroke-width="0.6"/>
        <circle cx="56" cy="44" r="2.5" fill="#ffd700" stroke="#c79100" stroke-width="0.6"/>
        <text x="10" y="22" font-size="3.5" text-anchor="middle" fill="#8b6914" font-weight="900">¥</text>
        <text x="54" y="24" font-size="3.5" text-anchor="middle" fill="#8b6914" font-weight="900">¥</text>
        <!-- 皇冠 -->
        <path d="M 22 14 L 24 8 L 28 12 L 32 6 L 36 12 L 40 8 L 42 14 Z" fill="#ffd700" stroke="#c79100" stroke-width="0.8"/>
        <circle cx="32" cy="9" r="1" fill="#ff6b6b"/>
        <!-- 猫头/身 -->
        <rect x="20" y="16" width="24" height="22" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 耳朵 -->
        <polygon points="20,16 18,10 24,14" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="44,16 46,10 40,14" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 眼 - 弯弯笑 -->
        <path d="M 25 24 Q 27 22 29 24" fill="none" stroke="#24170d" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M 35 24 Q 37 22 39 24" fill="none" stroke="#24170d" stroke-width="1.6" stroke-linecap="round"/>
        <!-- 嘴 - 三角粉鼻 + 微笑 -->
        <polygon points="31,28 33,28 32,30" fill="#ff6b9d"/>
        <path d="M 30 31 Q 32 33 34 31" fill="none" stroke="#24170d" stroke-width="1" stroke-linecap="round"/>
        <!-- 身体下半 -->
        <rect x="22" y="38" width="20" height="12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 尾巴 - 翘 -->
        <path d="M 42 42 Q 50 38 50 30" fill="none" stroke="#24170d" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M 42 42 Q 49 38 49 31" fill="none" stroke="#ef8b39" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 爪 -->
        <rect x="24" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <rect x="36" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
      `,
      // 心碎了：橘猫拿放大镜对着包裹，表情困惑
      heartbreak: `
        <!-- 心碎飘字 -->
        <text x="12" y="14" font-size="8" fill="#ef5e4f">💔</text>
        <!-- 包裹（在右下） -->
        <rect x="40" y="40" width="18" height="14" fill="#a07b5f" stroke="#24170d" stroke-width="1"/>
        <line x1="40" y1="47" x2="58" y2="47" stroke="#24170d" stroke-width="0.8"/>
        <line x1="49" y1="40" x2="49" y2="54" stroke="#24170d" stroke-width="0.8"/>
        <!-- 猫头 -->
        <rect x="14" y="18" width="22" height="20" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="14,18 12,12 18,16" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="36,18 38,12 32,16" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 眼 - 一只睁一只眯（盯着包裹） -->
        <circle cx="20" cy="26" r="1.8" fill="#24170d"/>
        <path d="M 28 25 Q 30 27 32 25" fill="none" stroke="#24170d" stroke-width="1.5"/>
        <!-- 嘴 - 倒 V (失望) -->
        <polygon points="23,30 25,30 24,32" fill="#ff6b9d"/>
        <path d="M 22 34 Q 24 32 26 34" fill="none" stroke="#24170d" stroke-width="1"/>
        <!-- 身体 -->
        <rect x="16" y="38" width="18" height="12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <rect x="18" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <rect x="28" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <!-- 放大镜（爪子拿） -->
        <line x1="32" y1="36" x2="42" y2="44" stroke="#444" stroke-width="2" stroke-linecap="round"/>
        <circle cx="44" cy="46" r="5" fill="rgba(180,220,255,0.3)" stroke="#444" stroke-width="1.5"/>
      `,
      // 急死了：猫追着乌龟
      urgent: `
        <!-- 速度线 -->
        <line x1="4" y1="22" x2="14" y2="22" stroke="#888" stroke-width="0.8"/>
        <line x1="2" y1="28" x2="12" y2="28" stroke="#888" stroke-width="0.8"/>
        <line x1="4" y1="34" x2="14" y2="34" stroke="#888" stroke-width="0.8"/>
        <!-- 焦虑滴汗 -->
        <ellipse cx="38" cy="14" rx="1.4" ry="2.2" fill="#5fb6ef" stroke="#24170d" stroke-width="0.5"/>
        <!-- 乌龟（前方） -->
        <ellipse cx="52" cy="42" rx="6" ry="4" fill="#5ea050" stroke="#24170d" stroke-width="1"/>
        <circle cx="58" cy="42" r="2" fill="#5ea050" stroke="#24170d" stroke-width="0.8"/>
        <circle cx="58.5" cy="41" r="0.5" fill="#24170d"/>
        <!-- 猫（后方追） -->
        <rect x="14" y="20" width="22" height="18" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="14,20 12,14 18,18" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="36,20 38,14 32,18" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 眼 - 大瞪着急 -->
        <circle cx="20" cy="26" r="2.2" fill="white" stroke="#24170d" stroke-width="0.8"/>
        <circle cx="20" cy="26" r="1.2" fill="#24170d"/>
        <circle cx="30" cy="26" r="2.2" fill="white" stroke="#24170d" stroke-width="0.8"/>
        <circle cx="30" cy="26" r="1.2" fill="#24170d"/>
        <!-- 嘴 - O 形 -->
        <ellipse cx="25" cy="32" rx="1.6" ry="2" fill="#24170d"/>
        <!-- 身体 -->
        <rect x="16" y="38" width="18" height="12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 跑姿势爪子 -->
        <rect x="14" y="46" width="4" height="5" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <rect x="32" y="46" width="4" height="5" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <!-- 尾巴飘 -->
        <path d="M 14 38 Q 6 36 4 42" fill="none" stroke="#ef8b39" stroke-width="2.5" stroke-linecap="round"/>
      `,
      // 顾不过来：猫敲键盘
      overload: `
        <!-- 头顶冒汗 + 多个！ -->
        <text x="30" y="9" font-size="6" font-weight="900" fill="#ef5e4f">!</text>
        <text x="40" y="11" font-size="5" font-weight="900" fill="#ef5e4f">!</text>
        <text x="22" y="11" font-size="5" font-weight="900" fill="#ef5e4f">!</text>
        <!-- 键盘 -->
        <rect x="10" y="42" width="44" height="10" fill="#3a3a3a" stroke="#24170d" stroke-width="1"/>
        <line x1="14" y1="46" x2="50" y2="46" stroke="#666" stroke-width="0.6"/>
        <rect x="14" y="44" width="3" height="2" fill="#888"/>
        <rect x="19" y="44" width="3" height="2" fill="#888"/>
        <rect x="24" y="44" width="3" height="2" fill="#888"/>
        <rect x="29" y="44" width="3" height="2" fill="#888"/>
        <rect x="34" y="44" width="3" height="2" fill="#888"/>
        <rect x="39" y="44" width="3" height="2" fill="#888"/>
        <rect x="44" y="44" width="3" height="2" fill="#888"/>
        <!-- 猫头 -->
        <rect x="20" y="14" width="24" height="22" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="20,14 18,8 24,12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="44,14 46,8 40,12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <!-- 眼 - 螺旋（晕） -->
        <circle cx="26" cy="22" r="2.4" fill="white" stroke="#24170d" stroke-width="0.8"/>
        <path d="M 26 22 m -1.5 0 a 1.5 1.5 0 1 0 3 0 a 1.5 1.5 0 1 0 -3 0" fill="none" stroke="#24170d" stroke-width="0.8"/>
        <circle cx="38" cy="22" r="2.4" fill="white" stroke="#24170d" stroke-width="0.8"/>
        <path d="M 38 22 m -1.5 0 a 1.5 1.5 0 1 0 3 0 a 1.5 1.5 0 1 0 -3 0" fill="none" stroke="#24170d" stroke-width="0.8"/>
        <!-- 嘴 - 锯齿 -->
        <polyline points="28,30 30,28 32,30 34,28 36,30" fill="none" stroke="#24170d" stroke-width="1.2" stroke-linejoin="miter"/>
        <!-- 爪子敲键盘 -->
        <rect x="20" y="38" width="6" height="6" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <rect x="38" y="38" width="6" height="6" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
      `,
      idle: `
        <rect x="20" y="16" width="24" height="22" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="20,16 18,10 24,14" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <polygon points="44,16 46,10 40,14" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <ellipse cx="26" cy="24" rx="2" ry="2" fill="#24170d"/>
        <ellipse cx="38" cy="24" rx="2" ry="2" fill="#24170d"/>
        <polygon points="31,28 33,28 32,30" fill="#ff6b9d"/>
        <path d="M 30 32 Q 32 34 34 32" fill="none" stroke="#24170d" stroke-width="1" stroke-linecap="round"/>
        <rect x="22" y="38" width="20" height="12" fill="#ef8b39" stroke="#24170d" stroke-width="1"/>
        <rect x="24" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <rect x="36" y="48" width="4" height="3" fill="#ef8b39" stroke="#24170d" stroke-width="0.8"/>
        <path d="M 42 42 Q 50 38 50 30" fill="none" stroke="#ef8b39" stroke-width="2.5" stroke-linecap="round"/>
      `,
    };

    const STATE_LABELS = {
      prosperity: '营业大吉',
      heartbreak: '心碎了',
      urgent: '急死了',
      overload: '顾不过来',
      idle: '巡店中',
    };

    const cat = document.getElementById('cat');
    const catSvg = document.getElementById('catSvg');
    const bubble = document.getElementById('bubble');
    const stateLabel = document.getElementById('stateLabel');
    const emote = document.getElementById('emote');

    let currentState = 'idle';
    let bubbleTimer = null;

    function setCat(stateId, text) {
      currentState = stateId;
      catSvg.innerHTML = CAT_SVG[stateId] || CAT_SVG.idle;
      cat.className = 'cat-container state-' + stateId;
      stateLabel.textContent = STATE_LABELS[stateId] || '巡店中';
      stateLabel.style.color = stateId === 'prosperity' ? '#c79100' : stateId === 'urgent' ? '#ef5e4f' : '#c46a20';

      if (text) showBubble(text);
    }

    function showBubble(text) {
      bubble.textContent = text;
      bubble.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 8000);
    }

    function showEmote(emoji) {
      emote.textContent = emoji;
      emote.classList.add('show');
      setTimeout(() => emote.classList.remove('show'), 2400);
    }

    // ============================================================
    // 接收主进程消息
    // ============================================================
    if (window.petApp) {
      petApp.onLoading(({ data, alerts }) => {
        // 在 LLM 返回前先用规则展示
        setCat(inferStateRule(data), '主人，我在想想…');
      });

      petApp.onUpdate((brainResult) => {
        const stateId = brainResult.catState?.id || 'idle';
        setCat(stateId, brainResult.catLine || brainResult.report?.catLine);
        showEmote(brainResult.catState?.emoji?.split('')[0] || '');
      });

      petApp.onError(({ message }) => {
        showBubble('喵～AI 暂时连不上：' + (message || '').slice(0, 30));
      });
    }

    function inferStateRule(data) {
      if (!data) return 'idle';
      const q = data.qualityScore ?? 5, l = data.logisticsScore ?? 5, s = data.serviceScore ?? 5;
      if (q < 4.6) return 'heartbreak';
      if (l < 4.6) return 'urgent';
      if (s < 4.6) return 'overload';
      return 'prosperity';
    }

    // ============================================================
    // 用户交互
    // ============================================================
    cat.addEventListener('click', (e) => {
      e.stopPropagation();
      window.petApp?.click();
    });

    document.getElementById('btn-report').addEventListener('click', () => {
      window.petApp?.click();
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      if (confirm('关闭守店猫？')) window.petApp?.closeApp();
    });

    // 初始状态
    setCat('idle');
    setTimeout(() => showBubble('主人，我在巡店～'), 600);
  </script>
</body>
</html>
