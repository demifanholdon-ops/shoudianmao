<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>守店猫</title>
  <style>
    :root {
      --paper: rgba(253, 246, 227, 0.96);
      --ink: #24170d;
      --orange: #ef8b39;
      --orange-deep: #c46a20;
      --green: #35c977;
      --red: #ef5e4f;
      --gray: #8a8a8a;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      background: transparent;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
      user-select: none;
      overflow: hidden;
    }
    .drag-region {
      position: fixed; inset: 0;
      -webkit-app-region: drag;
    }
    .toolbar {
      position: absolute; right: 8px; top: 8px;
      display: flex; gap: 6px;
      opacity: 0.25;
      transition: opacity 0.2s;
      -webkit-app-region: no-drag;
      z-index: 10;
    }
    .toolbar:hover { opacity: 1; }
    .toolbar button {
      width: 26px; height: 26px;
      border: 2px solid var(--ink);
      border-radius: 7px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
    }
    .toolbar button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

    .bubble {
      position: absolute;
      left: 12px; top: 14px;
      max-width: 240px;
      padding: 10px 12px;
      border: 2px solid var(--ink);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(6px) scale(.96);
      transition: opacity 0.2s, transform 0.2s;
      -webkit-app-region: no-drag;
      pointer-events: none;
      z-index: 5;
    }
    .bubble.show { opacity: 1; transform: translateY(0) scale(1); }
    .bubble::after {
      content: "";
      position: absolute;
      left: 110px; bottom: -10px;
      width: 14px; height: 14px;
      background: var(--paper);
      border-right: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      transform: rotate(45deg);
    }

    .cat-container {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -42%);
      width: 240px; height: 240px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      animation: bob 1.6s ease-in-out infinite;
      filter: drop-shadow(0 18px 14px rgba(0, 0, 0, 0.18));
    }
    .cat-container:active { animation-play-state: paused; }
    .cat-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .cat-img.swapping { opacity: 0; }

    .shadow {
      position: absolute;
      left: 50%; bottom: 30px;
      transform: translateX(-50%);
      width: 110px; height: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.22);
      filter: blur(2px);
      animation: shadowPulse 1.6s ease-in-out infinite;
    }

    .state-label {
      position: absolute;
      left: 50%; bottom: 8px;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      color: var(--orange-deep);
      background: var(--paper);
      padding: 3px 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      box-shadow: 2px 2px 0 var(--ink);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    @keyframes bob { 0%,100% { transform: translate(-50%, -42%); } 50% { transform: translate(-50%, -48%); } }
    @keyframes shadowPulse { 0%,100% { transform: translateX(-50%) scale(1); opacity: 0.22; } 50% { transform: translateX(-50%) scale(0.78); opacity: 0.12; } }

    /* 不同状态的节奏调整 */
    .cat-container.state-heartbreak  { animation-duration: 2.6s; }
    .cat-container.state-urgent      { animation-duration: 0.9s; }
    .cat-container.state-overload    { animation-duration: 1.1s; }
    .cat-container.state-prosperity  { animation-duration: 1.4s; }
    .cat-container.state-idle        { animation-duration: 2s; }
  </style>
</head>
<body>
  <div class="drag-region"></div>

  <div class="toolbar">
    <button id="btn-report" title="查看日报">📋</button>
    <button id="btn-close" title="关闭">×</button>
  </div>

  <div class="bubble" id="bubble">主人，我在巡店～</div>

  <div class="cat-container state-idle" id="cat">
    <img class="cat-img" id="catImg" src="./assets/cats/idle.apng" alt="守店猫" />
  </div>

  <div class="shadow"></div>
  <div class="state-label" id="stateLabel">巡店中</div>

  <script>
    // ============================================================
    // 状态 → GIF 资源映射
    // 来自团队的 FRAME_RELATION_GUIDE.md（命名修正过）：
    //   profit       → prosperity (营业大吉，皇冠+金币+星星)
    //   diamond      → heartbreak (心碎了，破损箱+放大镜) ← 历史命名陷阱
    //   logistics    → urgent     (急死了，追物流车)
    //   typing       → overload   (顾不过来，问号+键盘)
    // ============================================================
    const CAT_GIF = {
      prosperity: './assets/cats/prosperity.apng',
      heartbreak: './assets/cats/heartbreak.apng',
      urgent:     './assets/cats/urgent.apng',
      overload:   './assets/cats/overload.apng',
      idle:       './assets/cats/idle.apng',
    };

    const STATE_LABELS = {
      prosperity: '营业大吉',
      heartbreak: '心碎了',
      urgent: '急死了',
      overload: '顾不过来',
      idle: '巡店中',
    };

    const STATE_COLORS = {
      prosperity: '#c79100',
      heartbreak: '#ef5e4f',
      urgent: '#ef5e4f',
      overload: '#c46a20',
      idle: '#c46a20',
    };

    const cat = document.getElementById('cat');
    const catImg = document.getElementById('catImg');
    const bubble = document.getElementById('bubble');
    const stateLabel = document.getElementById('stateLabel');

    let currentState = 'idle';
    let bubbleTimer = null;

    function setCat(stateId, text) {
      if (!CAT_GIF[stateId]) stateId = 'idle';
      currentState = stateId;

      // 用 opacity 切换避免闪烁
      catImg.classList.add('swapping');
      setTimeout(() => {
        catImg.src = CAT_GIF[stateId] + '?t=' + Date.now(); // 强制 GIF 重新从头播放
        catImg.classList.remove('swapping');
      }, 200);

      cat.className = 'cat-container state-' + stateId;
      stateLabel.textContent = STATE_LABELS[stateId] || '巡店中';
      stateLabel.style.color = STATE_COLORS[stateId] || '#c46a20';

      if (text) showBubble(text);
    }

    function showBubble(text) {
      bubble.textContent = text;
      bubble.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 8000);
    }

    // ============================================================
    // IPC 监听
    // ============================================================
    if (window.petApp) {
      petApp.onLoading(({ data, alerts }) => {
        setCat(inferStateRule(data, alerts), '主人，我在想想…');
      });

      petApp.onUpdate((brainResult) => {
        const stateId = brainResult.catState?.id || 'idle';
        setCat(stateId, brainResult.catLine || brainResult.report?.catLine);
      });

      petApp.onError(({ message }) => {
        showBubble('喵～ 出了点小问题：' + (message || '').slice(0, 30));
      });
    }

    function inferStateRule(data, alerts = []) {
      if (!data) return 'idle';
      const q = data.qualityScore ?? 5, l = data.logisticsScore ?? 5, s = data.serviceScore ?? 5;
      if (q < 4.6) return 'heartbreak';
      if (l < 4.6) return 'urgent';
      if (s < 4.6) return 'overload';
      const hasHigh = alerts.some(a => a?.severity === 'high');
      const mediumCount = alerts.filter(a => a?.severity === 'medium').length;
      if (hasHigh) return 'urgent';
      if (mediumCount >= 3) return 'overload';
      return 'prosperity';
    }

    // ============================================================
    // 用户交互
    // ============================================================
    cat.addEventListener('click', (e) => {
      e.stopPropagation();
      window.petApp?.click();
    });

    document.getElementById('btn-report').addEventListener('click', () => {
      window.petApp?.click();
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      if (confirm('关闭守店猫？')) window.petApp?.closeApp();
    });

    // 初始
    setCat('idle');
    setTimeout(() => showBubble('主人，我在巡店～'), 600);

    // 开发模式：方便看 4 个状态的循环（只在 URL hash 是 #cycle 时启用）
    if (location.hash === '#cycle') {
      const order = ['idle', 'prosperity', 'heartbreak', 'urgent', 'overload'];
      let i = 0;
      setInterval(() => {
        i = (i + 1) % order.length;
        setCat(order[i], '切到：' + STATE_LABELS[order[i]]);
      }, 4000);
    }
  </script>
</body>
</html>
